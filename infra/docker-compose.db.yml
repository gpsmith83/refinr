services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: refinr
      POSTGRES_USER: refinr
      POSTGRES_PASSWORD: refinr
    ports:
      - "5432:5432"
    volumes:
      - refinr_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U refinr -d refinr"]
      interval: 5s
      timeout: 5s
      retries: 20
volumes:
  refinr_db_data:
